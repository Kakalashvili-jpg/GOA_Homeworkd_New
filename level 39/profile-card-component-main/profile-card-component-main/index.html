<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <div class="card-top"></div>

    <div class="avatar">
      <img src="images/image-victor.jpg" alt="profile">
    </div>

    <h2>Victor Crest <span>26</span></h2>
    <p class="location">London</p>

    <div class="stats">
      <div>
        <h3>80K</h3>
        <p>Followers</p>
      </div>
      <div>
        <h3>803K</h3>
        <p>Likes</p>
      </div>
      <div>
        <h3>1.4K</h3>
        <p>Photos</p>
      </div>
    </div>
  </div>

</body>
</html>
