 <!-- კომენტარის სახით ახსენით თითოეული კუთვნილება:

grid-template-columns - განსაზღვრავს რამდენი column ექნება grid s

grid-column - განსაზღვრავს დასაწყის და დასასრულს სვეტში

grid-row - განსაზღვრავს დასაწყის და დასასრულს რიგში

gap - განსაზღვრავს ელემენტებს შორის დაშორებას

z-index - განსაზღვრავს რომელი ელემენტი იქნება ზევით

grid-area - ერთმანეთთან აერთბს ელემენტებს სახელით

grid-template-areas -ადგენს grid ს განლაგებას 
 -->
